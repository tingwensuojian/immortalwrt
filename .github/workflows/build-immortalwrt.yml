name: Build ImmortalWrt x86_64

on:
  workflow_dispatch:
  push:
    branches: [main, master]

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - uses: actions/checkout@v4

    - name: 准备编译目录 & 克隆源码
      run: |
        sudo mkdir -p /work/openwrt
        sudo chown $USER:$USER /work/openwrt
        cd /work/openwrt
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH immortalwrt

    - name: 安装编译依赖
      run: |
        sudo apt-get update -y
        sudo apt-get install -y build-essential gcc g++ binutils flex bison \
          python3 python3-pip python3-setuptools python3-dev \
          python3-yaml python3-jsonschema \
          perl libssl-dev libelf-dev zlib1g-dev \
          libncurses5-dev libncursesw5-dev \
          rsync file wget curl unzip git \
          subversion uuid-runtime xxd \
          libpam0g-dev qemu-utils upx

    - name: 添加第三方 feeds
      run: |
        cd /work/openwrt/immortalwrt
        echo "src-git kenzok8 https://github.com/kenzok8/openwrt-packages.git" >> feeds.conf.default
        echo "src-git istore https://github.com/linkease/istore.git" >> feeds.conf.default
        cat feeds.conf.default

    - name: 更新 & 安装 feeds
      run: |
        cd /work/openwrt/immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 写入 .config 编译配置
      run: |
        cd /work/openwrt/immortalwrt
        cat > .config << 'EOF'
CONFIG_TARGET_x86=y
CONFIG_TARGET_x86_64=y
CONFIG_TARGET_x86_64_Generic=y
CONFIG_TARGET_x86_64_Generic_grub2=y
CONFIG_TARGET_IMAGES_GZIP=y
CONFIG_TARGET_ROOTFS_PARTSIZE=1024
CONFIG_GRUB_TIMEOUT="3"
CONFIG_VMDK_IMAGES=y
CONFIG_TARGET_KERNEL_PARTSIZE=256
CONFIG_LUCI_LANG_zh_Hans=y
CONFIG_CCACHE=y
CONFIG_AUTOREMOVE=y
CONFIG_PACKAGE_luci-app-passwall=y
CONFIG_PACKAGE_luci-app-passwall2=y
CONFIG_PACKAGE_luci-app-ssr-plus=y
CONFIG_PACKAGE_luci-app-openclash=y
CONFIG_PACKAGE_xray-core=y
CONFIG_PACKAGE_v2ray-core=y
CONFIG_PACKAGE_v2ray-geoip=y
CONFIG_PACKAGE_v2ray-geosite=y
CONFIG_PACKAGE_hysteria=y
CONFIG_PACKAGE_tuic-client=y
CONFIG_PACKAGE_chinadns-ng=y
CONFIG_PACKAGE_luci-app-adguardhome=y
CONFIG_PACKAGE_luci-app-adblock=y
CONFIG_PACKAGE_luci-app-dnsfilter=y
CONFIG_PACKAGE_luci-app-mosdns=y
CONFIG_PACKAGE_luci-app-msd_lite=y
CONFIG_PACKAGE_luci-app-unblockmusic=y
CONFIG_PACKAGE_unblockmusic_go=y
CONFIG_PACKAGE_luci-app-ddns=y
CONFIG_PACKAGE_luci-app-upnp=y
CONFIG_PACKAGE_luci-app-sqm=y
CONFIG_PACKAGE_luci-app-mwan3=y
CONFIG_PACKAGE_luci-app-zerotier=y
CONFIG_PACKAGE_luci-app-tailscale=y
CONFIG_PACKAGE_luci-app-turboacc=y
CONFIG_PACKAGE_turboacc-include-bbr-cc=y
CONFIG_PACKAGE_turboacc-include-flow-offload=y
CONFIG_PACKAGE_turboacc-include-shortcut-fe=y
CONFIG_PACKAGE_luci-app-lucky=y
CONFIG_PACKAGE_luci-app-samba4=y
CONFIG_PACKAGE_luci-app-vsftpd=y
CONFIG_PACKAGE_luci-app-aria2=y
CONFIG_PACKAGE_luci-app-transmission=y
CONFIG_PACKAGE_luci-app-qbittorrent=y
CONFIG_PACKAGE_luci-app-aliyundrive-webdav=y
CONFIG_PACKAGE_kmod-usb-core=y
CONFIG_PACKAGE_kmod-usb-storage=y
CONFIG_PACKAGE_kmod-usb-storage-extras=y
CONFIG_PACKAGE_kmod-usb3=y
CONFIG_PACKAGE_kmod-fs-ext4=y
CONFIG_PACKAGE_kmod-fs-ntfs=y
CONFIG_PACKAGE_kmod-fs-exfat=y
CONFIG_PACKAGE_kmod-fs-vfat=y
CONFIG_PACKAGE_ntfs-3g=y
CONFIG_PACKAGE_block-mount=y
CONFIG_PACKAGE_luci-app-netdata=y
CONFIG_PACKAGE_luci-app-vnstat=y
CONFIG_PACKAGE_luci-app-wol=y
CONFIG_PACKAGE_luci-app-vlmcsd=y
CONFIG_PACKAGE_luci-app-ttyd=y
CONFIG_PACKAGE_luci-app-autoreboot=y
CONFIG_PACKAGE_luci-app-watchcat=y
CONFIG_PACKAGE_luci-app-diskman=y
CONFIG_PACKAGE_luci-app-eqos=y
CONFIG_PACKAGE_luci-app-cpufreq=y
CONFIG_PACKAGE_luci-app-ram-free=y
CONFIG_PACKAGE_luci-app-filetransfer=y
CONFIG_PACKAGE_luci-app-wechatpush=y
CONFIG_PACKAGE_luci-app-store=y
CONFIG_PACKAGE_luci-app-quickstart=y
CONFIG_PACKAGE_taskd=y
CONFIG_PACKAGE_luci-app-dockerman=y
CONFIG_PACKAGE_docker=y
CONFIG_PACKAGE_dockerd=y
CONFIG_PACKAGE_luci-app-frpc=y
CONFIG_PACKAGE_luci-app-nps=y
CONFIG_PACKAGE_luci-app-usb-printer=y
CONFIG_PACKAGE_p910nd=y
CONFIG_PACKAGE_luci-theme-argon=y
CONFIG_PACKAGE_luci-app-argon-config=y
CONFIG_PACKAGE_luci-app-statistics=y
CONFIG_PACKAGE_luci-app-onliner=y
CONFIG_PACKAGE_luci-app-nlbwmon=y
CONFIG_PACKAGE_htop=y
CONFIG_PACKAGE_iperf3=y
CONFIG_PACKAGE_shadowsocks-libev-ss-server=y
CONFIG_PACKAGE_shadowsocks-libev-ss-local=y
CONFIG_PACKAGE_shadowsocksr-libev-alt=y
CONFIG_PACKAGE_simple-obfs=y
CONFIG_PACKAGE_v2ray-plugin=y
CONFIG_PACKAGE_xray-plugin=y
CONFIG_DEBUG_INFO=n
CONFIG_BUILD_LOG=n
EOF
        make defconfig

    - name: 下载软件包源码
      run: |
        cd /work/openwrt/immortalwrt
        make download -j$(nproc) 2>&1
        find dl -size -1024c -exec rm -rf {} \;

    - name: 编译固件
      id: compile
      run: |
        cd /work/openwrt/immortalwrt
        make -j$(nproc) V=s 2>&1 | tee build.log | grep -E '^make|ERROR:|Error |error:'

    - name: 上传编译日志
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: /work/openwrt/immortalwrt/build.log
        retention-days: 3

    - name: 上传固件
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-x86_64-Full
        path: /work/openwrt/immortalwrt/bin/targets/x86/64/*
        retention-days: 14
