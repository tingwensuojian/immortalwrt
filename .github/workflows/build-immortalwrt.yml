# ============================================================
# ImmortalWrt x86_64 全功能固件 — GitHub Actions 自动编译
# 适用版本: ImmortalWrt master
# 目标架构: x86_64 (x86 Generic)
# ============================================================

name: Build ImmortalWrt x86_64

on:
  workflow_dispatch:
  push:
    branches: [main, master]

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: 签出代码（你的 fork）
      uses: actions/checkout@v4

    - name: 准备编译目录
      run: |
        sudo mkdir -p /work/openwrt
        sudo chown $USER:$USER /work/openwrt

    - name: 克隆 ImmortalWrt 源码
      run: |
        cd /work/openwrt
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH immortalwrt

    - name: 安装编译依赖
      run: |
        sudo apt-get update -y
        sudo apt-get install -y build-essential gcc g++ binutils flex bison \
          python3 python3-pip python3-setuptools python3-dev \
          python3-yaml python3-jsonschema \
          perl libssl-dev libelf-dev zlib1g-dev \
          libncurses5-dev libncursesw5-dev \
          rsync file wget curl unzip git \
          subversion uuid-runtime xxd \
          libpam0g-dev qemu-utils upx

    - name: 添加第三方 feeds（kenzok8 + istore）
      run: |
        cd /work/openwrt/immortalwrt
        echo "src-git kenzok8 https://github.com/kenzok8/openwrt-packages.git" >> feeds.conf.default
        echo "src-git istore https://github.com/linkease/istore.git" >> feeds.conf.default
        cat feeds.conf.default

    - name: 更新 & 安装 feeds
      run: |
        cd /work/openwrt/immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 导入编译配置
      run: |
        cp $GITHUB_WORKSPACE/config/immortalwrt-x86_64.config /work/openwrt/immortalwrt/.config
        cd /work/openwrt/immortalwrt
        make defconfig

    - name: 下载软件包源码
      run: |
        cd /work/openwrt/immortalwrt
        make download -j$(nproc) 2>&1
        find dl -size -1024c -exec rm -rf {} \;

    - name: 编译固件
      id: compile
      run: |
        cd /work/openwrt/immortalwrt
        make -j$(nproc) V=s 2>&1 | tee build.log | grep -E '^make|ERROR:|Error |error:'

    - name: 上传编译日志
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: /work/openwrt/immortalwrt/build.log
        retention-days: 3

    - name: 上传固件
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-x86_64-Full
        path: |
          /work/openwrt/immortalwrt/bin/targets/x86/64/*
        retention-days: 14

    - name: 发布 Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        name: ImmortalWrt x86_64 $(date +'%Y-%m-%d')
        tag_name: release-$(date +'%Y%m%d-%H%M')
        files: |
          /work/openwrt/immortalwrt/bin/targets/x86/64/*.img.gz
          /work/openwrt/immortalwrt/bin/targets/x86/64/*.vmdk
          /work/openwrt/immortalwrt/bin/targets/x86/64/*.iso
          /work/openwrt/immortalwrt/bin/targets/x86/64/sha256sums
